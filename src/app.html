<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="text-scale" content="scale" />

		<!-- Apply the theme before first paint to avoid a flash of the wrong theme. -->
		<script>
			(() => {
				try {
					const stored = localStorage.getItem('theme');
					const dark =
						stored === 'dark' ||
						(!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
				} catch {
					/* ignore */
				}
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
